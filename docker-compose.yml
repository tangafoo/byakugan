# Local Postgres + pgvector for byakugan's server-side corpus store.
# Phase B wires retrieval to this; for now it just stands ready.
#   docker compose up -d        # start in background
#   docker compose down         # stop (data persists in the named volume)
#   docker compose down -v      # stop AND wipe the corpus volume
services:
  db:
    image: pgvector/pgvector:pg17 # Postgres 17 with the vector extension baked in
    container_name: byakugan-db
    environment:
      POSTGRES_USER: byakugan
      POSTGRES_PASSWORD: byakugan
      POSTGRES_DB: byakugan
    ports:
      # host:container. Host port is 5433 (not 5432) to dodge the Supabase
      # containers already squatting on 5432. The DB still speaks 5432 *inside*
      # the container; we just reach it from the host at localhost:5433.
      - "5433:5432"
    volumes:
      - byakugan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byakugan"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  byakugan_pgdata:
